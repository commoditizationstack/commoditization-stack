# ============================================================================
# GLOBAL DEFAULT PARAMETERS - SINGLE SOURCE OF TRUTH
# ============================================================================
# Every tunable numeric parameter in the simulation is documented here.
# Code in src/, scripts/ and app/ reads from this file via src/config.py.
# Scenario YAMLs under config/scenarios/ override any subset by deep-merge.
#
# Sections:
#   1. simulation             - top-level run controls (seed, MC runs, horizon)
#   2. monte_carlo            - Monte Carlo perturbation envelopes
#   3. stack_layers           - 7-layer framework velocities & substitutabilities
#   4. knowledge_regimes      - Layer 7 K7 regime defaults + cross-border friction
#   5. startup                - team, runway, sector economics, growth dynamics
#   6. investor               - thesis weights, scoring normalizations
#   7. valuation              - Damodaran (classical + inverted), comparables, Berkus
#   8. valuation_layered      - TRL premium, layer-risk coefficients, exposure, stages
#   9. valuation_two_phase    - phase boundaries + per-phase beta/D-E/spread defaults
#  10. firms_appendix_b       - NeuroCertify + DataFlow Pro fixtures for Appendix B
#  11. jurisdictions          - Brazil/France/US fiscal-accounting parameters
#  12. hype_cycle             - classical + post-genai curve parameters
#  13. death_valley           - cash-trajectory templates
#  14. sweeps                 - script-level sweep grids (heatmaps, sensitivity)
#  15. streamlit_ui           - Streamlit slider defaults and firm profile presets
#  16. structural             - structural constants (logit scaling, clip bounds)
#  17. migration_dynamics     - Section 7.5: orchestrator, learning curve, transition
#  18. streaming_case         - Appendix D: streamer cost decomposition, scenarios
#  19. fiscal_blocs           - Appendix D.6: corporate tax, transfer pricing, 5y projection
#  20. fragility_index        - Appendix E.5: fragility index coefficients
#  21. upstream_chain         - Appendix F: 7 upstream firm categories + sensitivities
#  22. distributional         - Appendix G: double threshold, XAI capacity gap
#  23. case_studies_dynamic   - Appendix E: NeuroCertify + DataFlow Pro detailed splits
#  24. macro                  - Risk-free rate, ERP, terminal growth (used by Appendices A, B)
#  25. funding_stages_carta   - Carta Q3 2025 funding-round benchmarks (Appendix E)
# ============================================================================

# ----------------------------------------------------------------------------
# 1. SIMULATION
# ----------------------------------------------------------------------------
simulation:
  random_seed: 42
  monte_carlo_runs: 10000
  time_horizon_quarters: 32
  output_dir: "outputs"

# ----------------------------------------------------------------------------
# 2. MONTE CARLO - perturbation standard deviations (log-normal CV)
# ----------------------------------------------------------------------------
monte_carlo:
  team_size_cv: 0.20
  burn_rate_cv: 0.15
  ai_substitution_cv: 0.25
  market_multiple_cv: 0.30
  layer_velocity_cv: 0.20
  substitutability_perturbation_sigma: 0.05  # additive noise on s_2026 per layer

# ----------------------------------------------------------------------------
# 3. STACK LAYERS - seven layers of the knowledge-production stack
# Layer 1 is split into training/inference because their velocities differ
# in sign; the two sub-keys count as one layer in the paper's numbering.
# ----------------------------------------------------------------------------
stack_layers:
  layer_1_infra_inference:
    name: "Infrastructure (inference compute)"
    velocity: 0.40
    substitutability_2026: 0.85
  layer_1_infra_training:
    name: "Infrastructure (training compute)"
    velocity: -0.10
    substitutability_2026: 0.10
  layer_2_foundation_models:
    name: "Foundation models"
    velocity: 0.20
    substitutability_2026: 0.55
  layer_3_capability_access:
    name: "Capability access (APIs)"
    velocity: 0.35
    substitutability_2026: 0.80
  layer_4_codified_synthesis:
    name: "Codified retrieval, synthesis, prototyping"
    velocity: 0.30
    substitutability_2026: 0.70
  layer_5_hypothesis:
    name: "Hypothesis formulation and judgment"
    velocity: 0.05
    substitutability_2026: 0.20
  layer_6_institutional:
    name: "Institutional embedding and certification"
    velocity: -0.05
    substitutability_2026: 0.05

# ----------------------------------------------------------------------------
# 4. KNOWLEDGE REGIMES (Layer 7 - tentative hypothesis)
# K7 = knowledge-integration coefficient (0..1). Three reference regimes.
# cross_border_friction is applied when target_bloc != acquirer_bloc.
# ----------------------------------------------------------------------------
knowledge_regimes:
  cross_border_friction: 0.30
  default_regime: "current_2026"
  regimes:
    globalized_2020:
      K_coefficient: 1.00
      bloc_assignment: "globally_integrated"
      layer4_substitution_modulator: 1.00
      layer5_judgment_bias_factor: 1.00
      notes: "Pre-decoupling baseline. Approximate state circa 2018-2020."
    current_2026:
      K_coefficient: 0.70
      bloc_assignment: "western"
      layer4_substitution_modulator: 0.70
      layer5_judgment_bias_factor: 0.85
      notes: "Current estimated regime. Partial fragmentation. Illustrative value, not estimated."
    fragmented_2030:
      K_coefficient: 0.40
      bloc_assignment: "western"
      layer4_substitution_modulator: 0.40
      layer5_judgment_bias_factor: 0.55
      notes: "Hypothetical 2030 severe-fragmentation scenario. Counterfactual."
  layer5_judgment_bias_factor_floor: 0.10  # divisor floor when computing judgment value

# ----------------------------------------------------------------------------
# 5. STARTUP - team composition, sector economics, growth dynamics
# ----------------------------------------------------------------------------
startup:
  initial_team_size: 12
  team_layer_distribution:
    layer_3: 0.65
    layer_4: 0.20
    layer_5: 0.15
  initial_runway_months: 18
  monthly_burn_per_engineer_usd: 12000
  initial_arr_usd: 0
  trl_initial: 4
  trl_target: 8
  cac_usd: 8000
  ltv_usd: 45000
  churn_monthly: 0.025
  ai_substitution_potential_layer4: 0.50

  # Growth dynamics (paper-calibrated; previously hardcoded in src/startup.py)
  growth:
    runway_months_before_team_can_grow: 10.0
    max_team_size_multiplier: 6                 # cap on team size = initial * this
    team_growth_per_month: 0.05                 # 5% MoM when growth is allowed
    seed_arr_threshold_usd: 50000               # ARR threshold to leave seed phase
    seed_arr_per_engineer_month_usd: 800.0      # ARR per eng-month during seed
    seed_growth_noise_sigma: 0.20               # log-normal noise on seed growth
    base_saas_growth_rate: 0.10                 # monthly compounding once past seed
    base_growth_noise_sigma: 0.10               # log-normal noise on SaaS growth
    trl_growth_per_month: 0.08                  # TRL units gained per month
    min_arr_for_saas_phase_usd: 1000000         # used by Investor's 5y projection
    saas_projection_growth_rate: 1.6            # 60% YoY in projection
    revenue_to_monthly_factor: 12               # ARR → monthly revenue divisor

  # Funding events (Series A/B/C). The multipliers scale to burn rate.
  funding_events:
    series_a_month: 12
    series_b_month: 24
    series_c_month: 36
    series_a_min_usd: 4000000
    series_b_min_usd: 12000000
    series_c_min_usd: 25000000
    series_a_burn_multiplier: 18   # months of burn covered
    series_b_burn_multiplier: 30
    series_c_burn_multiplier: 36

  market_size_usd: 2000000000   # default target market for simulation harness

# ----------------------------------------------------------------------------
# 6. INVESTOR - thesis weights, scoring normalizations
# ----------------------------------------------------------------------------
investor:
  target_irr: 0.40
  hold_period_years: 6
  default_dilution_per_round: 0.20
  use_ai_aware_thesis: true
  decision_threshold: 0.55
  overpriced_negotiation_multiple: 1.5
  scoring:
    # Score normalizations in Investor.score_startup() — currently log10-based.
    market_size_log_divisor: 11.0   # log10($1T) ≈ 11 saturates score
    traction_log_divisor: 8.0       # log10($100M ARR) ≈ 8 saturates score
    market_size_floor_usd: 1000000  # input floor before log
  thesis_weights_classical:
    team_quality: 0.30
    technology_moat: 0.25
    market_size: 0.20
    traction: 0.15
    regulatory_position: 0.10
  thesis_weights_ai_aware:
    team_quality: 0.20
    hypothesis_quality: 0.30
    institutional_embedding: 0.25
    technology_moat: 0.10
    market_size: 0.10
    traction: 0.05

# ----------------------------------------------------------------------------
# 7. VALUATION - Berkus, VC method, comparables, Damodaran classical+inverted
# ----------------------------------------------------------------------------
valuation:
  berkus_factor_cap_usd: 500000
  berkus_factor_weights:
    sound_idea: 1.0
    prototype: 1.0
    quality_team: 1.0
    strategic_relationships: 1.0
    product_rollout: 1.0
  berkus_prototype_signal_decay_2026: 0.55
  berkus_low_band_factor: 0.7
  berkus_high_band_factor: 1.3

  vc_method_low_band_factor: 0.6
  vc_method_high_band_factor: 1.4

  damodaran_key_person_discount_classical: 0.175
  damodaran_inverted_threshold_layer4_share: 0.55
  damodaran_inverted_max_premium: 0.15
  damodaran_inversion_min_substitution_potential: 0.30  # below this, classical wins
  damodaran_low_band_factor: 0.65
  damodaran_high_band_factor: 1.35
  damodaran_full_terminal_growth: 0.03

  comparable_revenue_multiple_baseline: 8.0
  comparable_multiple_volatility_post_genai: 0.35

# ----------------------------------------------------------------------------
# 8. VALUATION LAYERED (Appendix A)
# TRL-modulated discount rate (Equidam/Hectelion 2025), layer-decomposed risk
# premium, US funding-stage benchmarks (Carta Q3 2025).
# ----------------------------------------------------------------------------
valuation_layered:
  # TRL → discount premium (percentage points). Clipped to [1, 9].
  trl_discount_premium:
    1: 0.16
    2: 0.14
    3: 0.12
    4: 0.10
    5: 0.08
    6: 0.06
    7: 0.04
    8: 0.02
    9: 0.00

  # Per-layer risk-premium coefficients. Sign indicates commoditizing (+) vs
  # protective (-) layers. Applied to LayerExposure to get firm-specific premium.
  layer_risk_coefficients:
    layer_1_infra:         0.02
    layer_2_foundation:    0.01
    layer_3_capability:    0.04
    layer_4_codified:      0.08
    layer_5_judgment:     -0.04
    layer_6_institutional: -0.06
    layer_7_crossborder:   0.00

  # Layer-4 amplification by AI substitution potential: 0.5 + s
  layer4_substitution_amplifier_base: 0.5
  # Layer-7 premium per unit of (1 - K7), in pp
  layer7_k_premium_per_unit: 0.03

  # Default LayerExposure (must sum to 1.0). Editable per scenario.
  default_layer_exposure:
    layer_1_infra:         0.05
    layer_2_foundation:    0.05
    layer_3_capability:    0.10
    layer_4_codified:      0.30
    layer_5_judgment:      0.20
    layer_6_institutional: 0.20
    layer_7_crossborder:   0.10
  layer_exposure_sum_tolerance: 0.01   # allowed [0.99, 1.01]

  # US funding-stage benchmarks (Carta Q3 2025).
  us_funding_stage_benchmarks:
    pre_seed:
      median_premoney_usd: 13000000
      median_round_size_usd: 1000000
      typical_dilution: 0.125
      expected_revenue_usd: 0
    seed:
      median_premoney_usd: 16000000
      median_round_size_usd: 4000000
      typical_dilution: 0.20
      expected_revenue_usd: 500000
    series_a:
      median_premoney_usd: 49300000
      median_round_size_usd: 14000000
      typical_dilution: 0.179
      expected_revenue_usd: 3000000
    series_b:
      median_premoney_usd: 118900000
      median_round_size_usd: 40000000
      typical_dilution: 0.129
      expected_revenue_usd: 12000000
    series_c:
      median_premoney_usd: 350000000
      median_round_size_usd: 100000000
      typical_dilution: 0.10
      expected_revenue_usd: 30000000

  # stage_for_valuation() thresholds (USD EV)
  stage_thresholds_usd:
    pre_seed_upper: 15000000
    seed_upper: 32500000
    series_a_upper: 84000000
    series_b_upper: 235000000

# ----------------------------------------------------------------------------
# 9. VALUATION TWO-PHASE (Appendix B)
# Phase-conditional CAPM/WACC/EVA/ROI. Generic defaults; firm-specific
# fixtures live under section 10 (firms_appendix_b).
# ----------------------------------------------------------------------------
valuation_two_phase:
  default_phase_boundaries:
    phase_1_end_year: 2
    phase_2_end_year: 4
  default_betas:
    phase_1: 1.0
    phase_2: 1.4
    phase_3: 1.1
  default_de_ratios:
    phase_1: 0.05
    phase_2: 0.10
    phase_3: 0.20
  default_kd_spreads:
    phase_1: 0.03
    phase_2: 0.06
    phase_3: 0.04
  default_effective_tax_rate: 0.25

# ----------------------------------------------------------------------------
# 10. FIRMS APPENDIX B - NeuroCertify + DataFlow Pro fixtures
# Calibrated to Damodaran (Jan 2026) industry data.
# ----------------------------------------------------------------------------
firms_appendix_b:
  macro:
    risk_free_rate: 0.0425
    equity_risk_premium: 0.055
    terminal_growth: 0.03
  neurocertify:
    label: "NeuroCertify (deep-tech, HIT)"
    second_valley_drag: 0.05
    phases:
      phase_1_end_year: 2
      phase_2_end_year: 4
      beta_unlevered_phase_1: 0.85
      beta_unlevered_phase_2: 1.10
      beta_unlevered_phase_3: 0.99
      de_ratio_phase_1: 0.05
      de_ratio_phase_2: 0.12
      de_ratio_phase_3: 0.16
      kd_spread_phase_1: 0.025
      kd_spread_phase_2: 0.045
      kd_spread_phase_3: 0.035
      effective_tax_rate: 0.0638
    fcf_usd: [-1500000, -800000, 1200000, 5500000, 12000000]
    invested_capital_usd: [1500000, 2500000, 4000000, 7000000, 12000000]
    nopat_usd: [-1400000, -700000, 1300000, 5600000, 12500000]
  dataflow:
    label: "DataFlow Pro (Software, commoditizing)"
    second_valley_drag: 0.30
    phases:
      phase_1_end_year: 2
      phase_2_end_year: 4
      beta_unlevered_phase_1: 1.10
      beta_unlevered_phase_2: 1.50
      beta_unlevered_phase_3: 1.23
      de_ratio_phase_1: 0.04
      de_ratio_phase_2: 0.15
      de_ratio_phase_3: 0.06
      kd_spread_phase_1: 0.03
      kd_spread_phase_2: 0.08
      kd_spread_phase_3: 0.04
      effective_tax_rate: 0.0551
    fcf_usd: [-1200000, 800000, -200000, 4000000, 9500000]
    invested_capital_usd: [1200000, 2000000, 3500000, 6000000, 10000000]
    nopat_usd: [-1100000, 900000, -100000, 4100000, 9800000]

# ----------------------------------------------------------------------------
# 11. JURISDICTIONS - fiscal-accounting parameters for the substitution problem
# ----------------------------------------------------------------------------
jurisdictions:
  default_discount_rate: 0.12
  default_horizon_years: 5
  defaults:
    brazil:
      name: "Brazil (CLT)"
      labor_cost_multiplier: 1.80
      termination_cost_fraction: 0.25
      ai_service_overhead: 1.30
      notice_period_fraction: 0.083
      ai_opex_deductibility: 1.0
      vendor_risk_wacc_premium: 0.005
      notes: "CLT encargos 70-90%. Imported SaaS IRRF+CIDE+PIS/COFINS-imp. Termination FGTS multa+aviso previo."
    france:
      name: "France (CDI)"
      labor_cost_multiplier: 1.42
      termination_cost_fraction: 0.40
      ai_service_overhead: 1.20
      notice_period_fraction: 0.167
      ai_opex_deductibility: 1.0
      vendor_risk_wacc_premium: 0.005
      notes: "Charges patronales 42-45%. CDI termination rigide. TVA-importation 20%."
    united_states:
      name: "United States (W-2)"
      labor_cost_multiplier: 1.25
      termination_cost_fraction: 0.10
      ai_service_overhead: 1.00
      notice_period_fraction: 0.0
      ai_opex_deductibility: 1.0
      vendor_risk_wacc_premium: 0.002
      notes: "FICA+FUTA+SUTA ~8-10%. At-will termination."

# ----------------------------------------------------------------------------
# 12. HYPE CYCLE - classical Gartner + post-AI double-valley reformulation
# ----------------------------------------------------------------------------
hype_cycle:
  classical:
    peak_quarter: 4
    trough_quarter: 12
    plateau_quarter: 24
    peak_height: 100
    trough_height: 20
    plateau_height: 60
  post_genai:
    peak_quarter: 3
    trough_quarter: 8
    trough_height: 10
    second_peak_quarter: 14
    second_peak_height: 45
    commoditization_valley_quarter: 18
    commoditization_valley_height: 25
    plateau_quarter: 28
    plateau_height: 50

# ----------------------------------------------------------------------------
# 13. DEATH VALLEY - cash trajectory templates
# ----------------------------------------------------------------------------
death_valley:
  classical:
    n_months: 36
    initial_cash_usd: 2000000
    monthly_burn_usd: 150000
    valley_start_month: 6
    valley_end_month: 18
    revenue_ramp_start_month: 12
    peak_revenue_usd_per_month: 220000
    revenue_growth: 0.10
    revenue_seed_usd: 5000           # additive seed each month past ramp start
    minimum_runway_months: 3
  post_genai:
    n_months: 48
    initial_cash_usd: 1400000
    monthly_burn_usd_initial: 110000
    classical_valley_start_month: 4
    classical_valley_end_month: 10
    commoditization_valley_start_month: 22
    commoditization_valley_end_month: 36
    revenue_ramp_start_month: 8
    peak_revenue_usd_per_month: 280000
    revenue_growth: 0.14
    revenue_seed_usd: 6000
    margin_compression_factor: 0.30
    refinancing_event_month: 14
    refinancing_amount_usd: 3000000
    burn_growth_after_funding: 0.06
    post_funding_burn_multiplier: 2.5
  detection:
    valley_threshold_factor: 0.85   # 15% below running max counts as valley

# ----------------------------------------------------------------------------
# 14. SWEEPS - script-level grid resolutions (heatmaps, sensitivity)
# ----------------------------------------------------------------------------
sweeps:
  inverted_keyperson_heatmap:
    team_layer4_share_min: 0.20
    team_layer4_share_max: 0.90
    team_layer4_share_n: 36
    ai_substitution_min: 0.05
    ai_substitution_max: 0.95
    ai_substitution_n: 36
    enterprise_value_usd: 100000000
    color_vmin_pct: -15
    color_vmax_pct: 20
  layer7_k_grid:
    k_min: 0.0
    k_max: 1.0
    k_n: 21
  layer7_geometry:
    # fig14 grid resolution + Layer-5 bias formula 1 / max(floor, slope*K + intercept)
    k_n: 101
    layer5_bias_slope: 0.85
    layer5_bias_intercept: 0.15
  notebook_layer3_sweep:
    ai_substitution_min: 0.10
    ai_substitution_max: 0.95
    ai_substitution_n: 18
    team_share_min: 0.30
    team_share_max: 0.85
    team_share_n: 12

# ----------------------------------------------------------------------------
# 15. STREAMLIT UI - slider defaults and pre-baked firm profiles
# These drive the *defaults* shown when the app opens. Sliders are interactive.
# Paper parameters are read-only displays elsewhere (see app/tabs/).
# ----------------------------------------------------------------------------
streamlit_ui:
  sliders:
    k7_default: 0.7
    k7_min: 0.0
    k7_max: 1.0
    k7_step: 0.05
    ai_substitution_default: 0.6
    ai_substitution_min: 0.0
    ai_substitution_max: 1.0
    ai_substitution_step: 0.05
    layer4_exposure_default: 0.30
    layer5_exposure_default: 0.20
    layer6_exposure_default: 0.20
    layer_exposure_step: 0.05
  firm_profiles:
    neurocertify:
      label: "NeuroCertify (defensibility-rich)"
      layer4_codified: 0.20
      layer5_judgment: 0.20
      layer6_institutional: 0.40
    dataflow:
      label: "DataFlow Pro (commoditizing)"
      layer4_codified: 0.55
      layer5_judgment: 0.10
      layer6_institutional: 0.10
  tab_layers:
    effective_substitutability_modulation: 0.7   # multiplies K7 grid for effective s
    collapse_threshold_low: 0.40
    collapse_threshold_high: 0.50
    collapse_threshold_label: 0.45

# ----------------------------------------------------------------------------
# 16. STRUCTURAL - constants that are mathematical structure, not calibration
# Listed here for transparency and reproducibility, but rarely tuned.
# ----------------------------------------------------------------------------
structural:
  stack_layer_logit_scaling: 2.0       # in StackLayer.substitutability_at()
  substitutability_clip_min: 0.01
  substitutability_clip_max: 0.99
  classical_hype_rise_exponent: 1.5
  post_genai_hype_rise_exponent: 1.3

# ----------------------------------------------------------------------------
# 17. MIGRATION DYNAMICS (Section 7.5)
# Temporal model of AI migration: assessment phase, transition overheads,
# learning curve, permanent orchestrator function.
# Source: Brynjolfsson, Li & Raymond (2025); Cazzaniga et al. IMF (2024);
# Gartner (2025); McKinsey (2025); Battery Ventures (2026); Levels.fyi Q3 2025.
# ----------------------------------------------------------------------------
migration_dynamics:
  assessment_months: 9                  # Pre-T0 calibration period (Brynjolfsson 2025)
  orchestrator_ratio: 10                # 1 orchestrator per N retained engineers
  orchestrator_premium_pct: 0.142       # AI-skill premium over senior SWE (Levels.fyi)
  orchestrator_floor_per_arm: 1         # Minimum 1 orchestrator if any substitution
  dual_operation_overhead_quarters: 3   # T0 to T3
  retention_bonus_quarters: 2           # T1 to T2
  retention_bonus_fraction: 0.10        # of departing senior compensation
  ai_tooling_cost_per_dev_usd_year: 12000   # heavy-use profile, May 2026
  # Sigmoidal learning curve, fraction of structural saving captured by quarter
  learning_curve:
    Q1: 0.00
    Q2: 0.10
    Q3: 0.20
    Q4: 0.30
    Q5: 0.60
    Q6: 0.80
    Q7: 0.90
    Q8: 0.95
    Q9: 0.98
    Q10: 1.00
  # Senior software engineer loaded annual cost per jurisdiction (Section D.1.2, May 2026)
  loaded_swe_cost_usd_year:
    brazil: 95000        # Glassdoor BR mid-large tech, with 1.85 charge multiplier
    france: 145000       # APEC Paris median + 1.45 employer contributions
    united_states: 420000   # Levels.fyi SF Bay senior median TC × 1.51
  # Loaded mid-tier engineer cost (used for substitutable engineers)
  loaded_mid_engineer_usd_year:
    brazil: 60000
    france: 95000
    united_states: 285000
  # Loaded customer support agent cost
  loaded_support_usd_year:
    brazil: 28000
    france: 55000
    united_states: 95000
  reference_firm:
    n_engineers: 50
    substitution_fraction: 0.60       # 60% of team replaceable
    break_even_months:                # per Figure 11, reference firm
      brazil: 21
      france: 21
      united_states: 16
    cumulative_5y_usd_millions:       # 5-year net cumulative gain from T0
      brazil: 3.7
      france: 7.8
      united_states: 18.4

# ----------------------------------------------------------------------------
# 18. STREAMING CASE (Appendix D)
# Reference: global streamer at scale of segment leader, May 2026.
# Cost decomposition consistent with publicly reported segment-leader filings.
# ----------------------------------------------------------------------------
streaming_case:
  annual_revenue_usd: 44000000000
  standard_plan_price_usd_monthly: 15.49
  engineers_count: 3500
  support_agents_count: 1200
  # Cost decomposition of standard plan, as fraction of price
  cost_decomposition_pct:
    content_licensing_production: 0.50     # Layer 6 — untouchable by AI
    engineering_technology: 0.08           # Layer 4 — AI-substitutable
    customer_support: 0.03                 # Layer 4 — AI-substitutable
    cloud_cdn_infrastructure: 0.06         # Layer 1 — partially compressible
    marketing: 0.12
    general_administrative: 0.06
    operating_margin: 0.15
  # Three substitution scenarios per Appendix D.1.5
  substitution_scenarios:
    conservative_pct: 0.40
    moderate_pct: 0.60
    aggressive_pct: 0.78
  # Cross-bloc friction (entrant in different bloc than target market)
  cross_bloc_friction_pct: 0.30           # Reduces effective substitution rate

# ----------------------------------------------------------------------------
# 19. FISCAL BLOCS (Appendix D.6)
# Three jurisdictional blocs' 5-year fiscal projection under moderate substitution.
# Aggregates over streaming-and-adjacent consumer-app sector (multiplier ~6x).
# ----------------------------------------------------------------------------
fiscal_blocs:
  horizon_years: 5
  sector_workforce_multiplier: 6          # multiplier applied to single-firm reference
  corporate_tax_rate:
    brazil: 0.34
    france: 0.25
    united_states: 0.26
  employer_charges_effective_pct:         # Employer-side social charges as % of gross salary
    brazil: 0.368                          # INSS 20% + FGTS 8% + System S 5.8% + RAT 1-3% (Actual Profit)
    france: 0.45                           # URSSAF total cadre status 2026
    united_states: 0.327                   # FICA + FUTA + SUTA + benefits compulsory
  transfer_pricing_parent_share: 0.70     # HQ captures 70% of margin gain
  transfer_pricing_subsidiary_share: 0.15 # Local subsidiary captures 15%
  # Cumulative 5-year fiscal impact under moderate substitution (Fig D.8)
  # Positive value = State loses revenue; negative value = State gains revenue
  cumulative_5y_impact_usd_millions:
    brazil: 47
    france: 407
    united_states: -1922
  # Decomposition of 5-year impact
  decomposition_5y_usd_millions:
    lost_social_charges:
      brazil: 144
      france: 512
      united_states: 4340
    ai_token_export:                      # tax base exported to foreign AI provider
      brazil: 44
      france: 43
      united_states: -185                  # captured domestically (gain)
    compensating_tax_gain:                 # corporate tax on higher margin
      brazil: 141
      france: 148
      united_states: 6253

# ----------------------------------------------------------------------------
# 20. FRAGILITY INDEX (Appendix E.5)
# Map firms across the seven-layer framework by their fragility profile.
# Fragility index = L4_share - coefficient * L6_share.
# Negative => resilient; positive => fragile.
# ----------------------------------------------------------------------------
fragility_index:
  l6_coefficient: 1.5                     # weight of Layer 6 protection (illustrative)
  resilient_threshold: -0.10              # below this => clearly resilient zone
  fragile_threshold: 0.10                 # above this => clearly fragile zone
  # Color scale for the fragility map plot
  color_vmin: -0.7
  color_vmax: 0.7

# ----------------------------------------------------------------------------
# 21. UPSTREAM CHAIN (Appendix F)
# 7 categories of upstream AI value-chain firms mapped to layer exposure.
# Exposure: 3 = predominant, 2 = secondary, 1 = marginal, 0 = none.
# ----------------------------------------------------------------------------
upstream_chain:
  categories:
    foundry_pure_plays:
      label: "Foundry pure-plays (TSMC, GlobalFoundries)"
      exposure:
        L1_train: 3
        L1_infer: 1
        L2: 0
        L3: 0
        L4: 0
        L5: 0
        L6: 0
      structural_sensitivity: "training-capex cycle + financing conditions"
    training_silicon:
      label: "Training silicon (NVIDIA H/B-series, AMD MI)"
      exposure:
        L1_train: 3
        L1_infer: 2
        L2: 1
        L3: 0
        L4: 0
        L5: 0
        L6: 0
      structural_sensitivity: "training-capex cycle + financing conditions"
    inference_edge_silicon:
      label: "Inference & edge silicon (custom ASICs, edge NPUs)"
      exposure:
        L1_train: 1
        L1_infer: 3
        L2: 1
        L3: 1
        L4: 0
        L5: 0
        L6: 0
      structural_sensitivity: "aggregate Layer-4 adoption (subject to E.2 threshold)"
    memory_hbm:
      label: "Memory & HBM (Micron, SK Hynix, Samsung)"
      exposure:
        L1_train: 2
        L1_infer: 2
        L2: 0
        L3: 0
        L4: 0
        L5: 0
        L6: 0
      structural_sensitivity: "tracks training-capex side"
    hyperscalers:
      label: "Hyperscalers (AWS, Azure, GCP)"
      exposure:
        L1_train: 2
        L1_infer: 3
        L2: 2
        L3: 3
        L4: 1
        L5: 0
        L6: 1
      structural_sensitivity: "dual exposure; structurally insulated by scale + switching costs"
    frontier_labs:
      label: "Frontier labs (Anthropic, OpenAI, DeepMind)"
      exposure:
        L1_train: 2
        L1_infer: 2
        L2: 3
        L3: 3
        L4: 0
        L5: 1
        L6: 1
      structural_sensitivity: "anti-commoditizing on training; sensitive to K7 cross-border regime"
    ai_tooling_platforms:
      label: "AI-tooling platforms (Cursor, Lovable, Decagon)"
      exposure:
        L1_train: 0
        L1_infer: 1
        L2: 1
        L3: 2
        L4: 3
        L5: 1
        L6: 0
      structural_sensitivity: "most exposed to Layer-4 commoditization (recursive feedback)"
  # Capex sensitivity to financing tightness (Fig F.3 Panel A)
  capex_sensitivity:
    n_grid: 100
    tightness_min: 0.0
    tightness_max: 1.0
    training_decay_exponent: 2.0          # steeper decay for cumulative training capex
    inference_decay_exponent: 0.5         # gentler decay for marginal inference capex
    loose_credit_threshold: 0.2
    tight_credit_threshold: 0.7

# ----------------------------------------------------------------------------
# 22. DISTRIBUTIONAL (Appendix G)
# Double threshold for AI migration + XAI capacity gap across blocs.
# ----------------------------------------------------------------------------
distributional:
  double_threshold:
    n_grid: 100
    headcount_min: 0
    headcount_max: 100
    # Gross saving per engineer-year for institution-dominant firm
    # (L4 share × AI substitution potential × loaded SWE cost differential)
    gross_saving_per_eng_usd_year: 102000   # NeuroCertify Brazil arm calibration
    orchestrator_overhead_floor_usd: 200000  # Economic threshold
    xai_infrastructure_floor_usd: 370000     # Regulatory-compliance threshold
    institution_profile:
      layer4_share: 0.20
      ai_substitution_potential: 0.50
  xai_capacity_gap:
    horizon_years: 8
    base_year: 2026
    bloc_a_growth_factor:
      k_1_0: 1.025                       # 2.5% annual growth at K7=1.0
      k_0_7: 1.035                       # 3.5% with bloc-internal advantage
      k_0_45: 1.045                      # 4.5% with full bloc capture
    bloc_b_growth_factor:
      k_1_0: 1.020                       # parallel growth under integration
      k_0_7: 1.015                       # falls behind
      k_0_45: 1.010                      # falls further behind
    # Endpoint gap at year 8 under each K7 (Fig G.2)
    endpoint_gap_year_8:
      k_1_0: 0.05
      k_0_7: 0.21
      k_0_45: 0.34

