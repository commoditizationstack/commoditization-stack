scenario_name: "post_genai_2026_brazil_saas_b2b"
description: >
  Brazilian SaaS B2B firm operating under CLT regime. Same operational
  profile as post_genai_2026 (logistics analytics, AI-native), but with
  Brazilian fiscal-accounting parameters: high employer charges (~80% on
  top of base salary), imported AI services taxed at 25-40% above nominal
  USD price, termination costs ~25-30% of annual salary. The accounting-
  substitution problem (de Miranda Neto, 2026, section 6.5) predicts that
  the inverted key-person discount will be amplified relative to the US
  baseline because the marginal value of replacing a CLT employee with an
  AI subscription is materially higher.

inherits: "parameters.yaml"

startup:
  sector: "saas_b2b_logistics_brazil"
  initial_team_size: 8
  team_layer_distribution:
    layer_3: 0.70
    layer_4: 0.20
    layer_5: 0.10
  initial_runway_months: 14
  monthly_burn_per_engineer_usd: 6500          # local Brazilian salary base, lower in USD
  initial_arr_usd: 0
  trl_initial: 5
  trl_target: 8
  cac_usd: 6500
  ltv_usd: 52000
  churn_monthly: 0.018
  ai_substitution_potential_layer4: 0.55

investor:
  use_ai_aware_thesis: true

valuation:
  comparable_revenue_multiple_baseline: 6.0    # lower multiples in Brazilian VC
  damodaran_key_person_discount_classical: 0.18
  damodaran_inverted_threshold_layer4_share: 0.55

jurisdiction:
  name: "brazil"
  avg_base_salary_usd: 35000                   # mid-level dev, BRL ~R$200k * 1/5.7 USD/BRL
  annual_ai_cost_per_replaced_employee_usd: 4800   # ~$400/mo nominal SaaS spend
  # Accounting parameters (override jurisdiction defaults if needed):
  labor_cost_multiplier: 1.80
  termination_cost_fraction: 0.25
  notice_period_fraction: 0.083
  ai_service_overhead: 1.30
  vendor_risk_wacc_premium: 0.005
