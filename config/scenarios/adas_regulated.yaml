    layer_4: 0.25
    layer_5: 0.30
  initial_runway_months: 24
  monthly_burn_per_engineer_usd: 16000
  initial_arr_usd: 0
  trl_initial: 6
  trl_target: 9
  cac_usd: 250000
  ltv_usd: 1800000
  churn_monthly: 0.005
  ai_substitution_potential_layer4: 0.30

investor:
  use_ai_aware_thesis: true
  hold_period_years: 8

valuation:
