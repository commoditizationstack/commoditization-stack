scenario_name: "adas_regulated_2026"
description: >
  Alternative sector: ADAS / autonomous mobility deep-tech firm operating
  under regulated certification (ISO/IEC 42001, ISO/PAS 8800, EU AI Act).
  Layer 6 weight is much higher than in unregulated SaaS, which slows
  layer-4 commoditization effects on the firm.

