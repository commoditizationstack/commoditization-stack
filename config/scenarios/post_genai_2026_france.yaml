scenario_name: "post_genai_2026_france_saas_b2b"
description: >
  French SaaS B2B firm operating under CDI regime. Same operational profile
  as post_genai_2026 (logistics analytics, AI-native), but with French
  fiscal-accounting parameters: charges patronales of 42-45% on top of
  salaire brut, rigid CDI termination (indemnite de licenciement + preavis,
  ~30-50% of annual salary), TVA on imported non-EU SaaS services. The
  accounting-substitution problem (de Miranda Neto, 2026, section 6.5)
  predicts a moderately amplified inverted key-person discount relative to
  the US baseline, but attenuated by termination rigidity and TVA overhead.

inherits: "parameters.yaml"

startup:
  sector: "saas_b2b_logistics_france"
  initial_team_size: 8
  team_layer_distribution:
    layer_3: 0.70
    layer_4: 0.20
    layer_5: 0.10
  initial_runway_months: 14
  monthly_burn_per_engineer_usd: 6800          # French gross salary base, EUR ~70k
  initial_arr_usd: 0
  trl_initial: 5
  trl_target: 8
  cac_usd: 6500
  ltv_usd: 52000
  churn_monthly: 0.018
  ai_substitution_potential_layer4: 0.55

investor:
  use_ai_aware_thesis: true

valuation:
  comparable_revenue_multiple_baseline: 6.5
  damodaran_key_person_discount_classical: 0.18
  damodaran_inverted_threshold_layer4_share: 0.55

jurisdiction:
  name: "france"
  avg_base_salary_usd: 75000                   # ~70k EUR brut, mid-senior CDI
  annual_ai_cost_per_replaced_employee_usd: 4800
  labor_cost_multiplier: 1.42
  termination_cost_fraction: 0.40
  notice_period_fraction: 0.167
  ai_service_overhead: 1.20
  vendor_risk_wacc_premium: 0.005
